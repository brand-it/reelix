<div id="{{ self.dom_id() }}">
  <div class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div style="width: 100%; max-width: 420px; padding: 1.5rem;">
      <div class="card border-0 shadow-sm">
        <div class="card-body p-5 text-center">

          <div class="mb-4">
            <i class="fas fa-plug fa-2x text-warning"></i>
          </div>

          <h4 class="fw-semibold mb-1">Server Unreachable</h4>
          <p class="text-muted small mb-4">Could not connect to <code>{{ host }}</code></p>

          <p class="text-muted small mb-4">
            Make sure your Reelix Manager server is running and accessible, then try again.
          </p>

          <a href="/" class="btn btn-primary w-100 mb-2">
            <i class="fas fa-redo me-2"></i>Retry
          </a>

          <hr class="my-3 opacity-25">

          <a href="/set_host" class="btn btn-link btn-sm text-muted p-0">
            <i class="fas fa-server me-1"></i>Change server
          </a>

        </div>
      </div>
    </div>
  </div>
</div>
